<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css').replace('static', 'assets') }}">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR.Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>
<body>
    <header>Welcome to Our HR.Restaurant</header>
    <div class="container">
        <nav>
            <a href="#home">HOME</a> |
            <a href="#menu">MENU</a> |
            <a href="#location">LOCATION</a> |
            <a href="#aboutus">ABOUT US</a> |
            <a href="#contactus">CONTACT US</a> |
            <a href="login.html">LOGIN</a>
        </nav>

        <section id="home">
            <img src="{{ url_for('static', filename='images/banner.jpg') }}" alt="Banner">
        </section>

        <section id="menu">
            <h2>Our Menu</h2>
            <div class="grid-container">
                <img src="{{ url_for('static', filename='images/banner.jpg') }}" alt="HR.Restaurant">
                <img src="{{ url_for('static', filename='images/biryani.jpg') }}" alt="Menu item 1">
                <img src="{{ url_for('static', filename='images/keema.jpg') }}" alt="Menu item 2">
                <img src="{{ url_for('static', filename='images/burger.jpg') }}" alt="Menu item 3">
                <img src="{{ url_for('static', filename='images/pizzza.jpg') }}" alt="Menu item 4">
                <img src="{{ url_for('static', filename='images/coffe.jpg') }}" alt="Menu item 5">
                <img src="{{ url_for('static', filename='images/icecream.jpg') }}" alt="Menu item 6">
                
            </div>
        </section>

        <section id="login">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </section>

        <section id="signup">
            <h2>Sign Up</h2>
            <form id="signupForm">
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </section>
    </div>

    <!-- Login Page -->
    <section id="loginPage">
        <h2>Login</h2>
        <form id="loginFormPage">
            <input type="email" id="login-email-page" placeholder="Email" required>
            <input type="password" id="login-password-page" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </section>

    <!-- Signup Page -->
    <section id="signupPage">
        <h2>Sign Up</h2>
        <form id="signupFormPage">
            <input type="text" id="signup-name-page" placeholder="Full Name" required>
            <input type="email" id="signup-email-page" placeholder="Email" required>
            <input type="password" id="signup-password-page" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </section>
</body>
</html>
